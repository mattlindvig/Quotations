services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: quotations-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - quotations-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (HTTP only in Docker — TLS is terminated at the reverse proxy or load balancer in production)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quotations-backend
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - MongoDbSettings__ConnectionString=mongodb://admin:password123@mongodb:27017
      - MongoDbSettings__DatabaseName=quotations
      - Jwt__Secret=change-this-to-a-secret-at-least-32-chars-long
      - Jwt__Issuer=http://localhost:5000
      - Jwt__Audience=http://localhost:5173
      - Jwt__ExpirationMinutes=60
      - Anthropic__ApiKey=${ANTHROPIC_API_KEY}
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - quotations-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5000/api/v1
    container_name: quotations-frontend
    restart: unless-stopped
    environment:
      - VITE_API_BASE_URL=http://localhost:5000/api/v1
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - quotations-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  quotations-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
